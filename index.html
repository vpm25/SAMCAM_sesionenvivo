<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMCAM — Sesión en vivo</title>
<style>
  :root {
    --green:       #398463;
    --green-dark:  #26604A;
    --green-light: #EAF2EE;
    --green-mid:   #C4DBD0;
    --text:        #1a2a22;
    --muted:       #456b56;
    --border:      #a8c9b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #eef4f1; color: var(--text); min-height: 100vh; }

  .header { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1.5rem; background: #fff; border-bottom: 1px solid var(--border); }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-img { height: 56px; width: auto; display: block; }
  .title { font-size: 15px; font-weight: 500; color: var(--muted); }
  .badge-live { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: var(--green-light); color: var(--green-dark); border: 1px solid var(--border); }

  .tabs-wrap { background: var(--green-dark); padding: 0 1.5rem; }
  .tabs { display: flex; }
  .tab { flex: 1; padding: 10px 8px; font-size: 13px; border: none; background: transparent; cursor: pointer; color: rgba(255,255,255,0.65); border-bottom: 3px solid transparent; font-weight: 500; transition: all .15s; }
  .tab:hover { color: #fff; }
  .tab.active { color: #fff; border-bottom: 3px solid #fff; }

  .content { max-width: 860px; margin: 0 auto; padding: 1.5rem; }
  .section { display: none; }
  .section.visible { display: block; }

  /* CARDS */
  .card { background: #fff; border: 1px solid var(--border); border-left: 4px solid var(--green); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 12px; }
  .card.active-q { border-left: 4px solid var(--green); box-shadow: 0 0 0 3px var(--green-mid); }
  .card.closed-q { border-left: 4px solid var(--border); opacity: .75; }
  .card.pending-q { border-left: 4px solid #d4b896; }
  .q-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .q-text { font-size: 15px; font-weight: 500; flex: 1; }
  .q-num { color: var(--muted); font-weight: 400; margin-right: 6px; }
  .q-meta { font-size: 12px; color: var(--muted); white-space: nowrap; padding-top: 2px; }

  /* STATUS PILLS */
  .pill { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .pill.active  { background: var(--green-light); color: var(--green-dark); border: 1px solid var(--green); }
  .pill.closed  { background: #f1ede8; color: #7a6050; border: 1px solid #d4b896; }
  .pill.pending { background: #f5f5f3; color: #888; border: 1px solid #ccc; }

  /* FORMS */
  .add-form { background: var(--green-light); border: 1px solid var(--green-mid); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
  .form-label { font-size: 13px; font-weight: 600; color: var(--green-dark); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .5px; }
  input[type=text] { width: 100%; font-size: 14px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: #fff; color: var(--text); font-family: inherit; margin-bottom: 8px; }
  input[type=text]:focus { outline: none; border-color: var(--green); }
  textarea { width: 100%; font-size: 14px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: #eef4f1; color: var(--text); resize: vertical; min-height: 80px; font-family: inherit; }
  textarea:focus { outline: none; border-color: var(--green); }
  textarea:disabled { opacity: .6; cursor: not-allowed; }

  /* BUTTONS */
  .btn { padding: 7px 14px; font-size: 13px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--text); cursor: pointer; transition: all .15s; font-family: inherit; }
  .btn:hover:not(:disabled) { background: var(--green-light); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn.primary { background: var(--green); color: #fff; border-color: transparent; }
  .btn.primary:hover:not(:disabled) { background: var(--green-dark); }
  .btn.next { background: var(--green-dark); color: #fff; border-color: transparent; font-weight: 500; }
  .btn.next:hover:not(:disabled) { background: #1a4535; }
  .btn.danger { color: #a32d2d; border-color: #f09595; }
  .btn.danger:hover { background: #fcebeb; }
  .btn.sm { padding: 4px 10px; font-size: 12px; }
  .btn.copy { color: var(--green-dark); border-color: var(--border); }
  .btn.copy.copied { background: var(--green-light); border-color: var(--green); }
  .row-end { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

  /* ANSWERS */
  .answers-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .ans-chip { background: var(--green-light); border: 1px solid var(--green-mid); border-radius: 8px; padding: 8px 10px; font-size: 13px; line-height: 1.5; }
  .ans-name { font-size: 11px; color: var(--green-dark); font-weight: 600; margin-bottom: 3px; }
  .copy-bar { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--green-mid); display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .copy-hint { font-size: 12px; color: var(--muted); }

  /* PARTICIPANT WAITING */
  .waiting { text-align: center; padding: 4rem 1rem; }
  .waiting-icon { font-size: 40px; margin-bottom: 1rem; }
  .waiting h2 { font-size: 18px; font-weight: 500; color: var(--green-dark); margin-bottom: 8px; }
  .waiting p { font-size: 14px; color: var(--muted); }
  .pulse { display: inline-block; width: 10px; height: 10px; background: var(--green); border-radius: 50%; margin-right: 6px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }
  .mini-status { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .spinner-wrap { text-align: center; padding: 3rem 1rem; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--green-mid); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media(max-width:500px) { .q-header { flex-direction: column; } }
</style>
</head>

<div class="content">

  <!-- MODERADOR -->
  <div id="tab-moderator" class="section visible">
    <div class="add-form">
      <div class="form-label">Agregar pregunta</div>
      <input id="new-q-input" type="text" placeholder="Escribe la pregunta (puedes agregar varias antes de iniciar)..."
             onkeydown="if(event.key==='Enter') addQuestion()">
      <div class="row-end">
        <button class="btn primary" onclick="addQuestion()">+ Agregar</button>
      </div>
    </div>
    <div id="mod-list">
      <div class="spinner-wrap"><div class="spinner"></div><p style="color:var(--muted);font-size:13px">Conectando...</p></div>
    </div>
  </div>

  <!-- PARTICIPANTE -->
  <div id="tab-participant" class="section">
    <div id="part-list">
      <div class="spinner-wrap"><div class="spinner"></div><p style="color:var(--muted);font-size:13px">Cargando...</p></div>
    </div>
  </div>

  <!-- RESULTADOS -->
  <div id="tab-results" class="section">
    <div id="res-list">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>
  </div>

</div>

<script>
const DB = "https://samcam-sesion-en-vivo-default-rtdb.firebaseio.com";

let questions  = {};
let currentTab = 'moderator';
let sseSource  = null;

/* ── SSE TIEMPO REAL ── */
function startSSE() {
  if (sseSource) sseSource.close();
  sseSource = new EventSource(`${DB}/questions.json`);
  sseSource.addEventListener('put', e => {
    const msg = JSON.parse(e.data);
    if (msg.path === '/') {
      questions = msg.data || {};
    } else {
      const parts = msg.path.replace(/^\//, '').split('/');
      setNested(questions, parts, msg.data);
    }
    setBadge(true);
    render();
  });
  sseSource.onerror = () => setBadge(false);
  sseSource.onopen  = () => setBadge(true);
}

function setNested(obj, keys, value) {
  if (keys.length === 1) {
    if (value === null) delete obj[keys[0]]; else obj[keys[0]] = value;
    return;
  }
  if (!obj[keys[0]]) obj[keys[0]] = {};
  setNested(obj[keys[0]], keys.slice(1), value);
}

function setBadge(ok) {
  const b = document.getElementById('conn-badge');
  b.textContent     = ok ? '● En vivo' : '● Sin conexión';
  b.style.background  = ok ? '#EAF2EE' : '#fcebeb';
  b.style.color       = ok ? '#26604A' : '#a32d2d';
  b.style.borderColor = ok ? '#a8c9b8' : '#f09595';
}

/* ── REST ── */
async function dbPatch(path, data) {
  await fetch(`${DB}/${path}.json`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
}
async function dbPost(path, data) {
  const r = await fetch(`${DB}/${path}.json`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  return r.json();
}
async function dbDelete(path) {
  await fetch(`${DB}/${path}.json`, { method: 'DELETE' });
}

/* ── TABS ── */
function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach((b,i) =>
    b.classList.toggle('active', ['moderator','participant','results'][i] === t));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.getElementById('tab-'+t).classList.add('visible');
  render();
}

function render() {
  if (currentTab === 'moderator')   renderModerator();
  if (currentTab === 'participant') renderParticipant();
  if (currentTab === 'results')     renderResults();
}

function sortedKeys() {
  return Object.keys(questions);
}

/* ════════════════════════════
   MODERADOR
════════════════════════════ */
async function addQuestion() {
  const inp  = document.getElementById('new-q-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  await dbPost('questions', { text, status: 'pending', answers: {} });
}

async function deleteQuestion(id) {
  if (!confirm('¿Eliminar esta pregunta?')) return;
  await dbDelete(`questions/${id}`);
}

async function activateQuestion(id) {
  // Cierra cualquier pregunta activa primero
  const keys = sortedKeys();
  for (const k of keys) {
    if (questions[k].status === 'active') {
      await dbPatch(`questions/${k}`, { status: 'closed' });
    }
  }
  await dbPatch(`questions/${id}`, { status: 'active' });
}

async function closeQuestion(id) {
  await dbPatch(`questions/${id}`, { status: 'closed' });
}

async function closeAndNext(id) {
  // Cierra actual
  await dbPatch(`questions/${id}`, { status: 'closed' });
  // Activa la siguiente pending
  const keys = sortedKeys();
  const idx  = keys.indexOf(id);
  for (let i = idx + 1; i < keys.length; i++) {
    if (questions[keys[i]].status === 'pending') {
      await dbPatch(`questions/${keys[i]}`, { status: 'active' });
      break;
    }
  }
}

function renderModerator() {
  const el   = document.getElementById('mod-list');
  const keys = sortedKeys();
  if (!keys.length) {
    el.innerHTML = '<div class="empty">No hay preguntas. Agrégalas arriba antes de iniciar la sesión.</div>';
    return;
  }

  const hasActive  = keys.some(k => questions[k].status === 'active');
  const hasPending = keys.some(k => questions[k].status === 'pending');

  el.innerHTML = keys.map((id, i) => {
    const q   = questions[id];
    const ans = q.answers ? Object.values(q.answers) : [];
    const st  = q.status || 'pending';

    let pillHtml = '';
    if (st === 'active')  pillHtml = '<span class="pill active">● Activa</span>';
    if (st === 'closed')  pillHtml = '<span class="pill closed">Cerrada</span>';
    if (st === 'pending') pillHtml = '<span class="pill pending">En espera</span>';

    let actionsHtml = '';
    if (st === 'pending' && !hasActive) {
      actionsHtml = `<button class="btn sm primary" onclick="activateQuestion('${id}')">Activar</button>`;
    }
    if (st === 'active') {
      const nextPending = keys.slice(keys.indexOf(id)+1).some(k => questions[k].status === 'pending');
      actionsHtml = nextPending
        ? `<button class="btn sm next" onclick="closeAndNext('${id}')">Cerrar y siguiente →</button>
           <button class="btn sm danger" onclick="closeQuestion('${id}')">Solo cerrar</button>`
        : `<button class="btn sm danger" onclick="closeQuestion('${id}')">Cerrar pregunta</button>`;
    }
    if (st === 'closed') {
      actionsHtml = `<button class="btn sm" onclick="activateQuestion('${id}')">Reabrir</button>`;
    }

    return `
    <div class="card ${st}-q">
      <div class="q-header">
        <div class="q-text"><span class="q-num">${i+1}.</span>${q.text}</div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          ${pillHtml}
          <span class="q-meta">${ans.length} resp.</span>
          <button class="btn sm danger" onclick="deleteQuestion('${id}')">✕</button>
        </div>
      </div>
      <div class="mini-status">
        ${ans.length
          ? ans.map(a => `<span style="margin-right:8px">• ${a.text.substring(0,55)}${a.text.length>55?'...':''}</span>`).join('')
          : 'Sin respuestas aún.'}
      </div>
      ${actionsHtml ? `<div class="row-end" style="margin-top:10px">${actionsHtml}</div>` : ''}
    </div>`;
  }).join('');
}

/* ════════════════════════════
   PARTICIPANTE
════════════════════════════ */
async function submitAnswer(qid) {
  const textarea = document.getElementById('ans-'+qid);
  const text     = textarea.value.trim();
  if (!text) { textarea.focus(); return; }
  const time = new Date().toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'});
  const btn  = document.getElementById('btn-'+qid);
  if (btn) { btn.disabled = true; btn.textContent = 'Enviando...'; }
  await dbPost(`questions/${qid}/answers`, { name: 'Participante', text, time });
  textarea.value       = '';
  textarea.placeholder = '✓ Respuesta enviada';
  textarea.disabled    = true;
  if (btn) { btn.textContent = '✓ Enviado'; }
}

function renderParticipant() {
  const el   = document.getElementById('part-list');
  const keys = sortedKeys();
  const activeId = keys.find(k => questions[k].status === 'active');

  if (!activeId) {
    const hasClosed = keys.some(k => questions[k].status === 'closed');
    if (!keys.length || !hasClosed) {
      el.innerHTML = `
        <div class="waiting">
          <div class="waiting-icon">💬</div>
          <h2>La sesión está por comenzar</h2>
          <p><span class="pulse"></span>Espera a que el moderador active la primera pregunta</p>
        </div>`;
    } else {
      el.innerHTML = `
        <div class="waiting">
          <div class="waiting-icon">🎉</div>
          <h2>¡Sesión terminada!</h2>
          <p>Gracias por participar</p>
        </div>`;
    }
    return;
  }

  const q   = questions[activeId];
  const ans = q.answers ? Object.values(q.answers) : [];
  el.innerHTML = `
    <div class="card active-q" style="border-radius:12px">
      <div style="font-size:12px;font-weight:600;color:var(--green-dark);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">
        <span class="pulse"></span>Pregunta activa
      </div>
      <div style="font-size:17px;font-weight:500;margin-bottom:14px;line-height:1.4">${q.text}</div>
      <textarea id="ans-${activeId}" placeholder="Escribe tu respuesta aquí..."></textarea>
      <div class="row-end">
        <button class="btn primary" id="btn-${activeId}" onclick="submitAnswer('${activeId}')">Enviar respuesta</button>
      </div>
    </div>
    <div style="text-align:center;margin-top:1rem;font-size:12px;color:var(--muted)">
      ${ans.length} ${ans.length === 1 ? 'respuesta recibida' : 'respuestas recibidas'}
    </div>`;
}

/* ════════════════════════════
   RESULTADOS
════════════════════════════ */
function buildCopyText(id) {
  const q   = questions[id];
  const ans = q.answers ? Object.values(q.answers) : [];
  return `PREGUNTA: ${q.text}\n\n` +
    (ans.length ? ans.map((a,i) => `${i+1}. ${a.text}`).join('\n') : '(sin respuestas)');
}

function copyAnswers(id, btnId) {
  navigator.clipboard.writeText(buildCopyText(id)).then(() => {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar para Copilot'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyAll() {
  const keys = sortedKeys();
  const text = keys.map(id => buildCopyText(id)).join('\n\n─────────────────────\n\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-all-btn');
    if (!btn) return;
    btn.textContent = '✓ Todo copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar todo'; btn.classList.remove('copied'); }, 2000);
  });
}

function renderResults() {
  const el   = document.getElementById('res-list');
  const keys = sortedKeys();
  const closed = keys.filter(k => questions[k].status === 'closed');

  if (!closed.length) {
    el.innerHTML = '<div class="empty">Aún no hay preguntas cerradas. Los resultados aparecen aquí cuando el moderador cierra una pregunta.</div>';
    return;
  }

  const totalAns = closed.reduce((s,id) =>
    s + (questions[id].answers ? Object.values(questions[id].answers).length : 0), 0);

  el.innerHTML = closed.map((id, i) => {
    const q     = questions[id];
    const ans   = q.answers ? Object.values(q.answers) : [];
    const btnId = `copy-btn-${id}`;
    return `
    <div class="card">
      <div class="q-header">
        <div class="q-text"><span class="q-num">${i+1}.</span>${q.text}</div>
        <span class="q-meta">${ans.length} resp.</span>
      </div>
      <div class="answers-list">
        ${ans.length
          ? ans.map(a => `<div class="ans-chip"><div class="ans-name">${a.time}</div>${a.text}</div>`).join('')
          : '<div class="mini-status">Sin respuestas.</div>'}
      </div>
      ${ans.length ? `
        <div class="copy-bar">
          <span class="copy-hint">Pega en tu agente de Copilot</span>
          <button class="btn sm copy" id="${btnId}" onclick="copyAnswers('${id}','${btnId}')">Copiar para Copilot</button>
        </div>` : ''}
    </div>`;
  }).join('') + (totalAns > 0 ? `
    <div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end">
      <button class="btn copy" id="copy-all-btn" onclick="copyAll()">Copiar todo</button>
    </div>` : '');
}

startSSE();
</script>
</body>
</html>
