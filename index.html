<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMCAM — Sesión en vivo</title>
<style>
  :root {
    --green:       #398463;
    --green-dark:  #26604A;
    --green-light: #EAF2EE;
    --green-mid:   #C4DBD0;
    --text:        #1a2a22;
    --muted:       #456b56;
    --border:      #a8c9b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #eef4f1; color: var(--text); min-height: 100vh; }

  .header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; background: var(--green); }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 36px; height: 36px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .title { font-size: 17px; font-weight: 600; color: #fff; }
  .badge-live { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: rgba(255,255,255,0.25); color: #fff; border: 1px solid rgba(255,255,255,0.4); transition: background .3s; }

  .tabs-wrap { background: var(--green-dark); padding: 0 1.5rem; }
  .tabs { display: flex; }
  .tab { flex: 1; padding: 10px 8px; font-size: 13px; border: none; background: transparent; cursor: pointer; color: rgba(255,255,255,0.65); border-bottom: 3px solid transparent; font-weight: 500; transition: all .15s; }
  .tab:hover { color: #fff; }
  .tab.active { color: #fff; border-bottom: 3px solid #fff; }

  .content { max-width: 860px; margin: 0 auto; padding: 1.5rem; }
  .section { display: none; }
  .section.visible { display: block; }

  .card { background: #fff; border: 1px solid var(--border); border-left: 4px solid var(--green); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 12px; }
  .q-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .q-text { font-size: 15px; font-weight: 500; flex: 1; }
  .q-num { color: var(--muted); font-weight: 400; margin-right: 6px; }
  .q-meta { font-size: 12px; color: var(--muted); white-space: nowrap; padding-top: 2px; }

  .add-form { background: var(--green-light); border: 1px solid var(--green-mid); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
  .form-label { font-size: 13px; font-weight: 600; color: var(--green-dark); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .5px; }

  input[type=text] { width: 100%; font-size: 14px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: #fff; color: var(--text); font-family: inherit; margin-bottom: 8px; }
  input[type=text]:focus { outline: none; border-color: var(--green); }
  textarea { width: 100%; font-size: 14px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: #eef4f1; color: var(--text); resize: vertical; min-height: 76px; font-family: inherit; }
  textarea:focus { outline: none; border-color: var(--green); }
  textarea:disabled { opacity: .6; cursor: not-allowed; }

  .btn { padding: 7px 14px; font-size: 13px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--text); cursor: pointer; transition: all .15s; font-family: inherit; }
  .btn:hover:not(:disabled) { background: var(--green-light); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn.primary { background: var(--green); color: #fff; border-color: transparent; }
  .btn.primary:hover:not(:disabled) { background: var(--green-dark); }
  .btn.danger { color: #a32d2d; border-color: #f09595; }
  .btn.danger:hover { background: #fcebeb; }
  .btn.sm { padding: 4px 10px; font-size: 12px; }
  .btn.copy { color: var(--green-dark); border-color: var(--border); }
  .btn.copy.copied { background: var(--green-light); border-color: var(--green); }
  .row-end { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }

  .name-bar { display: flex; align-items: center; gap: 10px; background: var(--green-light); border: 1px solid var(--green-mid); padding: 10px 14px; border-radius: 8px; margin-bottom: 1.5rem; }
  .name-bar label { font-size: 13px; color: var(--muted); font-weight: 500; white-space: nowrap; }
  .name-bar input { flex: 1; max-width: 220px; margin-bottom: 0; }

  .answers-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .ans-chip { background: var(--green-light); border: 1px solid var(--green-mid); border-radius: 8px; padding: 8px 10px; font-size: 13px; line-height: 1.5; }
  .ans-name { font-size: 11px; color: var(--green-dark); font-weight: 600; margin-bottom: 3px; }

  .copy-bar { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--green-mid); display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .copy-hint { font-size: 12px; color: var(--muted); }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }
  .mini-status { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .spinner-wrap { text-align: center; padding: 3rem 1rem; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--green-mid); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media(max-width:500px) { .q-header { flex-direction: column; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" fill="#398463"/>
        <path d="M7 12h10M12 7v10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="title">SAMCAM — Sesión en vivo</span>
  </div>
  <span class="badge-live" id="conn-badge">Conectando...</span>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('moderator')">Moderador</button>
    <button class="tab" onclick="switchTab('participant')">Participante</button>
    <button class="tab" onclick="switchTab('results')">Resultados</button>
  </div>
</div>

<div class="content">

  <div id="tab-moderator" class="section visible">
    <div class="add-form">
      <div class="form-label">Nueva pregunta</div>
      <input id="new-q-input" type="text" placeholder="Escribe la pregunta para los participantes..."
             onkeydown="if(event.key==='Enter') addQuestion()">
      <div class="row-end">
        <button class="btn primary" onclick="addQuestion()">+ Agregar pregunta</button>
      </div>
    </div>
    <div id="mod-list">
      <div class="spinner-wrap"><div class="spinner"></div><p style="color:var(--muted);font-size:13px">Conectando...</p></div>
    </div>
  </div>

  <div id="tab-participant" class="section">
    <div class="name-bar">
      <label for="p-name">Tu nombre:</label>
      <input id="p-name" type="text" placeholder="Escribe tu nombre">
    </div>
    <div id="part-list">
      <div class="spinner-wrap"><div class="spinner"></div><p style="color:var(--muted);font-size:13px">Cargando preguntas...</p></div>
    </div>
  </div>

  <div id="tab-results" class="section">
    <div id="res-list">
      <div class="spinner-wrap"><div class="spinner"></div><p style="color:var(--muted);font-size:13px">Cargando resultados...</p></div>
    </div>
  </div>

</div>

<script>
/* ══════════════════════════════════════════
   FIREBASE REST API — sin SDK, puro fetch()
   Base URL de tu proyecto
══════════════════════════════════════════ */
const DB = "https://samcam-sesion-en-vivo-default-rtdb.firebaseio.com";

let questions  = {};
let currentTab = 'moderator';
let sseSource  = null;

/* ── CONEXIÓN SSE (tiempo real) ── */
function startSSE() {
  if (sseSource) sseSource.close();

  sseSource = new EventSource(`${DB}/questions.json`);

  sseSource.addEventListener('put', e => {
    const msg  = JSON.parse(e.data);
    const path = msg.path;
    const data = msg.data;

    if (path === '/') {
      questions = data || {};
    } else {
      const parts = path.replace(/^\//, '').split('/');
      setNested(questions, parts, data);
    }
    setBadge(true);
    render();
  });

  sseSource.addEventListener('patch', e => {
    const msg  = JSON.parse(e.data);
    Object.assign(questions, msg.data || {});
    render();
  });

  sseSource.onerror = () => setBadge(false);
  sseSource.onopen  = () => setBadge(true);
}

/* helper para actualizar nested objeto */
function setNested(obj, keys, value) {
  if (keys.length === 0) return;
  if (keys.length === 1) {
    if (value === null) delete obj[keys[0]];
    else obj[keys[0]] = value;
    return;
  }
  if (!obj[keys[0]]) obj[keys[0]] = {};
  setNested(obj[keys[0]], keys.slice(1), value);
}

function setBadge(ok) {
  const b = document.getElementById('conn-badge');
  b.textContent = ok ? '● En vivo' : '● Sin conexión';
  b.style.background = ok ? 'rgba(255,255,255,0.25)' : 'rgba(200,50,50,0.4)';
}

/* ── CRUD ── */
async function dbPost(path, data) {
  const res = await fetch(`${DB}/${path}.json`, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(data)
  });
  return res.json();
}

async function dbDelete(path) {
  await fetch(`${DB}/${path}.json`, { method: 'DELETE' });
}

/* ── TABS ── */
function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach((b, i) =>
    b.classList.toggle('active', ['moderator','participant','results'][i] === t));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.getElementById('tab-' + t).classList.add('visible');
  render();
}

function render() {
  if (currentTab === 'moderator')   renderModerator();
  if (currentTab === 'participant') renderParticipant();
  if (currentTab === 'results')     renderResults();
}

/* ════════════════════════════
   MODERADOR
════════════════════════════ */
async function addQuestion() {
  const inp  = document.getElementById('new-q-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  await dbPost('questions', { text, answers: {} });
}

async function deleteQuestion(id) {
  if (!confirm('¿Eliminar esta pregunta y todas sus respuestas?')) return;
  await dbDelete(`questions/${id}`);
}

function renderModerator() {
  const el   = document.getElementById('mod-list');
  const keys = Object.keys(questions);
  if (!keys.length) {
    el.innerHTML = '<div class="empty">No hay preguntas aún. Agrega la primera arriba.</div>';
    return;
  }
  el.innerHTML = keys.map((id, i) => {
    const q   = questions[id];
    const ans = q.answers ? Object.values(q.answers) : [];
    return `
    <div class="card">
      <div class="q-header">
        <div class="q-text"><span class="q-num">${i+1}.</span>${q.text}</div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          <span class="q-meta">${ans.length} resp.</span>
          <button class="btn sm danger" onclick="deleteQuestion('${id}')">Eliminar</button>
        </div>
      </div>
      <div class="mini-status">
        ${ans.length
          ? ans.map(a => `<span style="margin-right:8px">• <strong>${a.name}</strong>: ${a.text.substring(0,50)}${a.text.length>50?'...':''}</span>`).join('')
          : 'Sin respuestas aún.'}
      </div>
    </div>`;
  }).join('');
}

/* ════════════════════════════
   PARTICIPANTE
════════════════════════════ */
async function submitAnswer(qid) {
  const textarea = document.getElementById('ans-' + qid);
  const text     = textarea.value.trim();
  if (!text) { textarea.focus(); return; }
  const name = document.getElementById('p-name').value.trim() || 'Anónimo';
  const time = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
  const btn  = document.getElementById('btn-' + qid);
  if (btn) { btn.disabled = true; btn.textContent = 'Enviando...'; }
  await dbPost(`questions/${qid}/answers`, { name, text, time });
  textarea.value       = '';
  textarea.placeholder = '✓ Respuesta enviada';
  textarea.disabled    = true;
  if (btn) { btn.textContent = 'Enviado'; }
}

function renderParticipant() {
  const el   = document.getElementById('part-list');
  const keys = Object.keys(questions);
  if (!keys.length) {
    el.innerHTML = '<div class="empty">El moderador aún no ha agregado preguntas.</div>';
    return;
  }
  el.innerHTML = keys.map((id, i) => {
    const q   = questions[id];
    const ans = q.answers ? Object.values(q.answers) : [];
    return `
    <div class="card">
      <div class="q-header">
        <div class="q-text"><span class="q-num">${i+1}.</span>${q.text}</div>
        <span class="q-meta">${ans.length} respuestas</span>
      </div>
      <textarea id="ans-${id}" placeholder="Escribe tu respuesta..."></textarea>
      <div class="row-end">
        <button class="btn primary" id="btn-${id}" onclick="submitAnswer('${id}')">Enviar respuesta</button>
      </div>
    </div>`;
  }).join('');
}

/* ════════════════════════════
   RESULTADOS + COPIAR
════════════════════════════ */
function buildCopyText(id) {
  const q   = questions[id];
  const ans = q.answers ? Object.values(q.answers) : [];
  let txt   = `PREGUNTA: ${q.text}\n\n`;
  txt      += ans.length
    ? ans.map((a, i) => `${i+1}. [${a.name}]: ${a.text}`).join('\n')
    : '(sin respuestas)';
  return txt;
}

function copyAnswers(id, btnId) {
  navigator.clipboard.writeText(buildCopyText(id)).then(() => {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    const original = btn.textContent;
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 2000);
  });
}

function copyAll() {
  const keys = Object.keys(questions);
  if (!keys.length) return;
  const sep  = '\n\n─────────────────────\n\n';
  const text = keys.map(id => buildCopyText(id)).join(sep);
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-all-btn');
    if (!btn) return;
    btn.textContent = '✓ Todo copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar todo'; btn.classList.remove('copied'); }, 2000);
  });
}

function renderResults() {
  const el   = document.getElementById('res-list');
  const keys = Object.keys(questions);
  if (!keys.length) {
    el.innerHTML = '<div class="empty">No hay preguntas aún.</div>';
    return;
  }

  const totalAns = keys.reduce((s, id) =>
    s + (questions[id].answers ? Object.values(questions[id].answers).length : 0), 0);

  el.innerHTML = keys.map((id, i) => {
    const q     = questions[id];
    const ans   = q.answers ? Object.values(q.answers) : [];
    const btnId = `copy-btn-${id}`;
    return `
    <div class="card">
      <div class="q-header">
        <div class="q-text"><span class="q-num">${i+1}.</span>${q.text}</div>
        <span class="q-meta">${ans.length} respuestas</span>
      </div>
      <div class="answers-list">
        ${ans.length
          ? ans.map(a => `
            <div class="ans-chip">
              <div class="ans-name">${a.name} · ${a.time}</div>
              ${a.text}
            </div>`).join('')
          : '<div class="mini-status">Sin respuestas aún.</div>'}
      </div>
      ${ans.length ? `
        <div class="copy-bar">
          <span class="copy-hint">Pega esto en tu agente de Copilot</span>
          <button class="btn sm copy" id="${btnId}" onclick="copyAnswers('${id}','${btnId}')">Copiar para Copilot</button>
        </div>` : ''}
    </div>`;
  }).join('') + (totalAns > 0 ? `
    <div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end">
      <button class="btn copy" id="copy-all-btn" onclick="copyAll()">Copiar todo</button>
    </div>` : '');
}

/* ── ARRANQUE ── */
startSSE();
</script>
</body>
</html>
